<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Illusion Fight</title>
  <script>
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.host + l.pathname.split('/')[1] + '/?/' +
      l.pathname.slice(1) + (l.search ? '&' + l.search.slice(1) : '') +
      l.hash
    );
  </script>
</head>
</html>
