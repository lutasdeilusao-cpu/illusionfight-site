<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Illusion Fight</title>
  <script>
    var l = window.location;
    var segments = l.pathname.split('/');
    var repoPath = '/' + segments[1];
    var restPath = segments.slice(2).join('/');
    l.replace(
      l.protocol + '//' + l.host + repoPath + '/?/' +
      restPath + (l.search ? '&' + l.search.slice(1) : '') +
      l.hash
    );
  </script>
</head>
</html>
