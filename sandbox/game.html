<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Camera Test — Pokémon-style</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0a0a;touch-action:none;display:flex;align-items:center;justify-content:center;user-select:none;-webkit-user-select:none}
#game-wrap{
  width:min(100vw,calc(100dvh*9/16));
  height:min(100dvh,calc(100vw*16/9));
  max-width:480px;
  overflow:hidden;position:relative;
  background:#1a1a1a;cursor:default;
  border-radius:12px;border:1px solid #333;
  box-shadow:0 0 60px rgba(0,0,0,0.8);
  touch-action:none;
}
#canvas-wrap{
  position:absolute;top:0;left:0;width:100%;height:100%;
  overflow:hidden;
}
#tile-canvas{position:absolute;image-rendering:pixelated;will-change:transform;top:0;left:0}

/* ── PLAYER SPRITE ─────────────────────────── */
#player{
  position:absolute;
  width:32px;height:32px;
  z-index:100;
  pointer-events:none;
  image-rendering:pixelated;
  /* sprite sheet via background */
  background-image:url('playerSheet.png');
  background-repeat:no-repeat;
  /* each frame 32x32, sheet 128x96 */
  background-size:128px 96px;
  /* default: down row, frame 0 */
  background-position:0px 0px;
}

#hud{
  position:absolute;top:8px;left:8px;z-index:200;
  font-family:monospace;font-size:10px;color:#8a8a6a;
  pointer-events:none;line-height:1.5;text-shadow:0 0 4px #000;
}

/* ── ZONE HUD ─────────────────────────── */
#zone-hud{
  position:absolute;
  top:8px;left:50%;transform:translateX(-50%);
  z-index:250;
  font-family:monospace;font-size:10px;font-weight:bold;
  color:#e8c96a;letter-spacing:0.12em;text-transform:uppercase;
  pointer-events:none;
  background:rgba(0,0,0,0.75);
  padding:4px 10px;
  border-radius:4px;
  border:1px solid rgba(232,201,106,0.35);
  text-shadow:0 0 8px rgba(232,201,106,0.5);
  opacity:0;
  transition:opacity 0.4s ease;
  white-space:nowrap;
}
#zone-hud.visible{opacity:1}

/* ── MINIMAP ─────────────────────────── */
#minimap{
  position:absolute;
  top:8px;right:8px;
  width:80px;height:80px;
  z-index:250;
  background:rgba(0,0,0,0.8);
  border:1px solid #444;
  border-radius:4px;
  overflow:hidden;
  pointer-events:none;
}
#minimap-canvas{
  position:absolute;top:0;left:0;
  width:100%;height:100%;
  image-rendering:pixelated;
}
#mm-player{
  position:absolute;
  width:3px;height:3px;
  background:#e8c96a;
  border-radius:50%;
  transform:translate(-50%,-50%);
  z-index:2;
  box-shadow:0 0 4px rgba(232,201,106,0.8);
}
#minimap-border{
  position:absolute;inset:0;
  border:1px solid rgba(232,201,106,0.2);
  border-radius:4px;
  z-index:3;
  pointer-events:none;
}

/* ── GAME BOY PANEL ─────────────────────────── */
#gb-panel{
  position:absolute;bottom:0;left:0;right:0;
  height:30%;z-index:290;min-height:100px;
  background:linear-gradient(180deg,#2a2825 0%,#1f1d1a 100%);
  border-top:3px solid #3a3733;
  border-radius:0 0 12px 12px;
  pointer-events:none;
  box-shadow:inset 0 8px 12px rgba(0,0,0,0.4);
}
#controls-area{
  position:absolute;bottom:4px;left:6px;right:6px;
  height:130px;z-index:300;
  pointer-events:none;
  display:flex;align-items:center;
  justify-content:space-between;
  padding:0 8px;
}
#ab-buttons{
  position:relative;width:90px;height:80px;
  pointer-events:none;flex-shrink:0;
}
.btn-ab{
  position:absolute;width:36px;height:36px;
  border-radius:50%;
  pointer-events:auto;cursor:pointer;
  font-family:monospace;font-size:12px;font-weight:bold;
  display:flex;align-items:center;justify-content:center;
  border:2px solid #666;color:#aaa;
  text-shadow:0 1px 0 #000;
}
.btn-ab:active{transform:scale(0.92)}
#btn-a{
  top:0;right:0;
  background:#4a2a2a;border-color:#8a4444;color:#cc6666;
  box-shadow:0 2px 0 #2a1515;
}
#btn-b{
  bottom:0;left:0;
  background:#2a2a4a;border-color:#44448a;color:#6666cc;
  box-shadow:0 2px 0 #15152a;
}
/* ── ANALOG STICK ──────────────────────────── */
#analog-container{
  position:absolute;bottom:16px;left:36px;
  z-index:300;display:none;pointer-events:none;
}
#analog-outer{
  width:96px;height:96px;border-radius:50%;
  background:radial-gradient(circle,rgba(255,255,255,0.08) 0%,rgba(255,255,255,0.03) 100%);
  border:2px solid rgba(255,255,255,0.15);
  position:relative;pointer-events:none;
}
#analog-inner{
  width:40px;height:40px;border-radius:50%;
  background:radial-gradient(circle,rgba(232,201,106,0.35) 0%,rgba(232,201,106,0.15) 100%);
  border:2px solid rgba(232,201,106,0.3);
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);
  pointer-events:none;transition:none;
}
#analog-knob{
  width:36px;height:36px;border-radius:50%;
  background:radial-gradient(circle,rgba(232,201,106,0.5) 0%,rgba(232,201,106,0.2) 100%);
  border:2px solid rgba(232,201,106,0.4);
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);
  pointer-events:none;transition:none;
  box-shadow:0 0 20px rgba(232,201,106,0.15);
}
#analog-hint{
  position:absolute;bottom:6px;left:50%;transform:translateX(-50%);
  z-index:300;font-family:monospace;font-size:9px;color:#555;
  pointer-events:none;text-align:center;text-shadow:0 0 4px #000;
}
</style>
</head>

// CONFIG
// ═══════════════════════════════════════════════════════
const TILE_W    = 8;
const TILE_H    = 8;
const SPACING   = 1;
const COLS      = 24;
const FIRST_GID = 1;
const ZOOM      = 4;
const STEP      = 8 * ZOOM;   // 32px por tile
const STEP_MS   = 160;        // duração de cada passo (ms)
const ANALOG_RADIUS = 40;

const MAP_W = 55;
const MAP_H = 30;
const WORLD_W = MAP_W * TILE_W * ZOOM;
const WORLD_H = MAP_H * TILE_H * ZOOM;

// ═══════════════════════════════════════════════════════
// SPRITE ANIMATION
// Sprite sheet: 4 colunas × 3 linhas, cada frame 32×32
//   Linha 0 (row=0): andar para BAIXO
//   Linha 1 (row=1): andar para LADO direita (flipa para esquerda)
//   Linha 2 (row=2): andar para CIMA
// ═══════════════════════════════════════════════════════
const SPRITE_FRAME_W = 32;
const SPRITE_FRAME_H = 32;
const SPRITE_COLS    = 4;
const ANIM_FPS       = 8;          // frames por segundo da animação
const ANIM_INTERVAL  = 1000 / ANIM_FPS;

// Mapeamento direção → linha do sprite sheet
const DIR_ROW = { down: 0, side: 1, up: 2 };

let spriteDir     = 'down';   // direção atual
let spriteFlip    = false;    // true = espelhar horizontalmente (andar p/ esquerda)
let spriteFrame   = 0;        // coluna atual (0–3)
let spriteIdle    = true;     // parado = trava no frame 0
let lastFrameTime = 0;

function updateSprite(now) {
  const player = document.getElementById('player');
  const row = DIR_ROW[spriteDir];

  // avança frame só se estiver em movimento
  if (!spriteIdle && now - lastFrameTime > ANIM_INTERVAL) {
    spriteFrame = (spriteFrame + 1) % SPRITE_COLS;
    lastFrameTime = now;
  }
  if (spriteIdle) {
    spriteFrame = 0; // frame de idle = primeiro frame
  }

  const bx = -(spriteFrame * SPRITE_FRAME_W);
  const by = -(row * SPRITE_FRAME_H);

  player.style.backgroundPosition = `${bx}px ${by}px`;
  // flipa horizontalmente quando vai para esquerda
  player.style.transform = spriteFlip ? 'scaleX(-1)' : 'scaleX(1)';
}

// ═══════════════════════════════════════════════════════
// ZONES
// ═══════════════════════════════════════════════════════
const ZONES = [
  { name: 'FLORESTA DO NORTE',    tx: 0,  ty: 0,  tw: 22, th: 16 },
  { name: 'TORRE DO VIGIA',       tx: 40, ty: 0,  tw: 15, th: 10 },
  { name: 'PLANÍCIE CENTRAL',     tx: 22, ty: 0,  tw: 18, th: 30 },
  { name: 'RUÍNAS DO LESTE',      tx: 40, ty: 10, tw: 15, th: 20 },
  { name: 'PÂNTANO DO SUL',       tx: 0,  ty: 16, tw: 22, th: 14 },
];

function getZoneName(tileX, tileY) {
  for (const z of ZONES) {
    if (tileX >= z.tx && tileX < z.tx + z.tw &&
        tileY >= z.ty && tileY < z.ty + z.th) return z.name;
  }
  return null;
}

// ═══════════════════════════════════════════════════════
// COLLISION
// ═══════════════════════════════════════════════════════
const collisionGrid = new Uint8Array(MAP_W * MAP_H);

function buildCollisionGrid(layers) {
  const col = layers.find(l => l.name === 'Collision');
  if (col) {
    for (let i = 0; i < MAP_W * MAP_H; i++)
      if (col.data[i] !== 0) collisionGrid[i] = 1;
  }
  const obj = layers.find(l => l.name === 'Objects');
  if (obj) {
    for (let i = 0; i < MAP_W * MAP_H; i++)
      if (obj.data[i] !== 0) collisionGrid[i] = 1;
  }
}

function isSolid(wx, wy) {
  const tx = Math.floor(wx / (TILE_W * ZOOM));
  const ty = Math.floor(wy / (TILE_H * ZOOM));
  if (tx < 0 || ty < 0 || tx >= MAP_W || ty >= MAP_H) return true;
  return collisionGrid[ty * MAP_W + tx] === 1;
}

// hitbox centralizada sob o sprite (pés)
// sprite 32×32 → hitbox 16×8 na metade inferior
const HIT = { ox: 8, oy: 22, w: 16, h: 8 };

function playerCollides(px, py) {
  const x0 = px + HIT.ox,      y0 = py + HIT.oy;
  const x1 = x0 + HIT.w - 1,  y1 = y0 + HIT.h - 1;
  return isSolid(x0,y0) || isSolid(x1,y0) ||
         isSolid(x0,y1) || isSolid(x1,y1);
}

// ═══════════════════════════════════════════════════════
// TILE RENDERER
// ═══════════════════════════════════════════════════════
function gidToXY(gid) {
  if (!gid || gid === 0) return null;
  const FLIP_MASK = 0x1fffffff;
  const cleanGid  = gid & FLIP_MASK;
  const localId   = cleanGid - FIRST_GID;
  const col       = localId % COLS;
  const row       = Math.floor(localId / COLS);
  return { sx: col * (TILE_W + SPACING), sy: row * (TILE_H + SPACING) };
}

function drawLayer(ctx, img, layer) {
  const mapW = layer.width;
  layer.data.forEach((gid, i) => {
    if (!gid) return;
    const coord = gidToXY(gid);
    if (!coord) return;
    const col = i % mapW;
    const row = Math.floor(i / mapW);
    ctx.drawImage(img,
      coord.sx, coord.sy, TILE_W, TILE_H,
      col * TILE_W * ZOOM, row * TILE_H * ZOOM,
      TILE_W * ZOOM, TILE_H * ZOOM
    );
  });
}

// ═══ MINIMAP ════════════════════════════════
function buildMinimap() {
  mmCtx.imageSmoothingEnabled = false;
  mmCtx.drawImage(canvas, 0, 0, WORLD_W, WORLD_H, 0, 0, 80, 80);
  mmCtx.globalAlpha = 0.25;
  const scaleX = 80 / WORLD_W;
  const scaleY = 80 / WORLD_H;
  const zoneColors = ['#e8c96a','#6ab4e8','#e86a6a','#6ae8a0','#c96ae8'];
  ZONES.forEach((z, i) => {
    mmCtx.fillStyle = zoneColors[i % zoneColors.length];
    mmCtx.fillRect(
      z.tx * TILE_W * ZOOM * scaleX, z.ty * TILE_H * ZOOM * scaleY,
      z.tw * TILE_W * ZOOM * scaleX, z.th * TILE_H * ZOOM * scaleY
    );
  });
  mmCtx.globalAlpha = 1;
}

// ═══ LOAD TILESET & RENDER MAP ════════════════════════
const img = new Image();
img.src = 'tilemap.png';
img.onload = () => {
  const terrain = MAP_DATA.layers.find(l => l.name === 'Terrain');
  const objects = MAP_DATA.layers.find(l => l.name === 'Objects');
  if (terrain) drawLayer(ctx, img, terrain);
  if (objects)  drawLayer(ctx, img, objects);
  buildCollisionGrid(MAP_DATA.layers);
  buildMinimap();
};

  if (moving) return;
  const nx = snapToGrid(px) + dx * STEP;
  const ny = snapToGrid(py) + dy * STEP;
  if (nx < 0 || ny < 0 || nx + SPRITE_FRAME_W > WORLD_W || ny + SPRITE_FRAME_H > WORLD_H) return;
  if (playerCollides(nx, ny)) return;

  // atualiza direção e flip do sprite
  if (dy === 1)  { spriteDir = 'down';  spriteFlip = false; }
  if (dy === -1) { spriteDir = 'up';    spriteFlip = false; }
  if (dx === 1)  { spriteDir = 'side';  spriteFlip = false; }
  if (dx === -1) { spriteDir = 'side';  spriteFlip = true;  }

  spriteIdle = false;

  moveFrom = { x: px, y: py };
  moveTo   = { x: nx, y: ny };
  moving = true;
  moveProgress = 0;
  moveStart = performance.now();
}

function updateMovement() {
  if (!moving) {
    spriteIdle = true;
    return;
  }
  const elapsed = performance.now() - moveStart;
  moveProgress = Math.min(elapsed / STEP_MS, 1);
  const t = 1 - (1 - moveProgress) * (1 - moveProgress);
  px = moveFrom.x + (moveTo.x - moveFrom.x) * t;
  py = moveFrom.y + (moveTo.y - moveFrom.y) * t;
  if (moveProgress >= 1) {
    px = moveTo.x;
    py = moveTo.y;
    moving = false;
  }
}

// ═══════════════════════════════════════════════════════
// ZONE HUD
// ═══════════════════════════════════════════════════════
let currentZone = null;
let zoneHideTimer = null;

function updateZoneHud(tileX, tileY) {
  const zone = getZoneName(tileX, tileY);
  if (zone !== currentZone) {
    currentZone = zone;
    if (zone) {
      zoneHud.textContent = zone;
      zoneHud.classList.add('visible');
      if (zoneHideTimer) clearTimeout(zoneHideTimer);
      zoneHideTimer = setTimeout(() => zoneHud.classList.remove('visible'), 3000);
    } else {
      zoneHud.classList.remove('visible');
    }
  }
}

function updateMinimapDot() {
  mmPlayer.style.left = (px / WORLD_W) * 80 + 'px';
  mmPlayer.style.top  = (py / WORLD_H) * 80 + 'px';
}

// ═══════════════════════════════════════════════════════
// ANALOG STICK
// ═══════════════════════════════════════════════════════
let activeTouchId = null;
let analogCenter = { x: 0, y: 0 };
let analogInterval = null;
let analogDir = { dx: 0, dy: 0 };

function analogRepeat() {
  if (analogDir.dx !== 0 || analogDir.dy !== 0) startMove(analogDir.dx, analogDir.dy);
}

function updateAnalog(clientX, clientY) {
  if (analogContainer.style.display === 'none') {
    analogContainer.style.display = 'block';
    const rect = analogContainer.getBoundingClientRect();
    analogCenter.x = rect.left + rect.width/2;
    analogCenter.y = rect.top + rect.height/2;
  }
  let dx = clientX - analogCenter.x;
  let dy = clientY - analogCenter.y;
  const dist = Math.sqrt(dx*dx + dy*dy);
  if (dist > ANALOG_RADIUS) { dx = (dx/dist)*ANALOG_RADIUS; dy = (dy/dist)*ANALOG_RADIUS; }
  analogKnob.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;

  const threshold = 0.35;
  let newDir = { dx: 0, dy: 0 };
  if (dist > 5) {
    const nx = dx / ANALOG_RADIUS;
    const ny = dy / ANALOG_RADIUS;
    if (Math.abs(nx) > Math.abs(ny)) {
      if (Math.abs(nx) > threshold) newDir = { dx: nx > 0 ? 1 : -1, dy: 0 };
    } else {
      if (Math.abs(ny) > threshold) newDir = { dx: 0, dy: ny > 0 ? 1 : -1 };
    }
  }
  if (newDir.dx !== analogDir.dx || newDir.dy !== analogDir.dy) {
    analogDir = newDir;
    if (analogInterval) { clearInterval(analogInterval); analogInterval = null; }
    if (analogDir.dx !== 0 || analogDir.dy !== 0) {
      startMove(analogDir.dx, analogDir.dy);
      analogInterval = setInterval(analogRepeat, 180);
    }
  }
}

function resetAnalog() {
  analogContainer.style.display = 'none';
  analogKnob.style.transform = 'translate(-50%, -50%)';
  if (analogInterval) { clearInterval(analogInterval); analogInterval = null; }
  analogDir = { dx: 0, dy: 0 };
  activeTouchId = null;
}

wrap.addEventListener('touchstart', e => {
  const target = e.target;
  if (target.closest && target.closest('.dpad-arm')) return;
  if (target.closest && target.closest('#btn-a, #btn-b')) return;
  if (activeTouchId !== null) return;
  const touch = e.changedTouches[0];
  activeTouchId = touch.identifier;
  analogContainer.style.display = 'block';
  const rect = analogContainer.getBoundingClientRect();
  analogCenter.x = rect.left + rect.width/2;
  analogCenter.y = rect.top + rect.height/2;
  const wrapRect = wrap.getBoundingClientRect();
  const distToTouch = Math.sqrt((touch.clientX - analogCenter.x)**2 + (touch.clientY - analogCenter.y)**2);
  if (distToTouch > ANALOG_RADIUS + 20) {
    const newLeft = Math.max(0, Math.min(wrap.clientWidth - 96, touch.clientX - 48 - wrapRect.left));
    analogContainer.style.left = newLeft + 'px';
    analogContainer.style.transform = 'none';
    const newRect = analogContainer.getBoundingClientRect();
    analogCenter.x = newRect.left + newRect.width/2;
    analogCenter.y = newRect.top + newRect.height/2;
  }
  updateAnalog(touch.clientX, touch.clientY);
}, { passive: false });

wrap.addEventListener('touchmove', e => {
  e.preventDefault();
  for (const touch of e.changedTouches) {
    if (touch.identifier === activeTouchId) { updateAnalog(touch.clientX, touch.clientY); break; }
  }
}, { passive: false });

wrap.addEventListener('touchend', e => {
  for (const touch of e.changedTouches) {
    if (touch.identifier === activeTouchId) { resetAnalog(); break; }
  }
}, { passive: true });
wrap.addEventListener('touchcancel', () => resetAnalog(), { passive: true });

wrap.addEventListener('mousedown', e => {
  if (e.target.closest && e.target.closest('.dpad-arm')) return;
  if (e.target.closest && e.target.closest('#btn-a, #btn-b')) return;
  if (activeTouchId !== null) return;
  activeTouchId = 'mouse';
  analogContainer.style.display = 'block';
  const rect = analogContainer.getBoundingClientRect();
  analogCenter.x = rect.left + rect.width/2;
  analogCenter.y = rect.top + rect.height/2;
  const wrapRect = wrap.getBoundingClientRect();
  const distToCenter = Math.sqrt((e.clientX - analogCenter.x)**2 + (e.clientY - analogCenter.y)**2);
  if (distToCenter > ANALOG_RADIUS + 20) {
    const newLeft = Math.max(0, Math.min(wrap.clientWidth - 96, e.clientX - 48 - wrapRect.left));
    analogContainer.style.left = newLeft + 'px';
    analogContainer.style.transform = 'none';
    const newRect = analogContainer.getBoundingClientRect();
    analogCenter.x = newRect.left + newRect.width/2;
    analogCenter.y = newRect.top + newRect.height/2;
  }
  updateAnalog(e.clientX, e.clientY);
});
window.addEventListener('mousemove', e => { if (activeTouchId === 'mouse') updateAnalog(e.clientX, e.clientY); });
window.addEventListener('mouseup', () => { if (activeTouchId === 'mouse') resetAnalog(); });

// ═══════════════════════════════════════════════════════
// KEYBOARD
// ═══════════════════════════════════════════════════════
const keyMap = {
  'ArrowUp':    { dx: 0, dy: -1 }, 'w': { dx: 0, dy: -1 }, 'W': { dx: 0, dy: -1 },
  'ArrowDown':  { dx: 0, dy: 1 },  's': { dx: 0, dy: 1 },  'S': { dx: 0, dy: 1 },
  'ArrowLeft':  { dx: -1, dy: 0 }, 'a': { dx: -1, dy: 0 }, 'A': { dx: -1, dy: 0 },
  'ArrowRight': { dx: 1, dy: 0 },  'd': { dx: 1, dy: 0 },  'D': { dx: 1, dy: 0 },
};
document.addEventListener('keydown', e => {
  const dir = keyMap[e.key];
  if (dir) { e.preventDefault(); startMove(dir.dx, dir.dy); }
});

// A/B BUTTONS
document.getElementById('btn-a').addEventListener('click', () => {
  zoneHud.textContent = '[ INTERAGIR ]';
  zoneHud.classList.add('visible');
  if (zoneHideTimer) clearTimeout(zoneHideTimer);
  zoneHideTimer = setTimeout(() => { zoneHud.classList.remove('visible'); currentZone = null; }, 1500);
});
document.getElementById('btn-b').addEventListener('click', () => {
  zoneHud.textContent = '[ CANCELAR ]';
  zoneHud.classList.add('visible');
  if (zoneHideTimer) clearTimeout(zoneHideTimer);
  zoneHideTimer = setTimeout(() => { zoneHud.classList.remove('visible'); currentZone = null; }, 1000);
});

// ═══════════════════════════════════════════════════════
// GAME LOOP
// ═══════════════════════════════════════════════════════
function gameLoop(now) {
  updateMovement();
  updateSprite(now);

  const VW = wrap.clientWidth;
  const VH = wrap.clientHeight;
  const PANEL_H = Math.round(VH * 0.30);
  const VH_eff = VH - PANEL_H;

  // câmera centraliza no meio do sprite (16px offset)
  const targetCamX = px - VW/2 + SPRITE_FRAME_W/2;
  const targetCamY = py - VH_eff/2 + SPRITE_FRAME_H/2 - PANEL_H/2;
  camX += (targetCamX - camX) * 0.08;
  camY += (targetCamY - camY) * 0.08;
  camX = Math.max(0, Math.min(WORLD_W - VW, camX));
  camY = Math.max(0, Math.min(WORLD_H - VH_eff, camY));

  canvas.style.transform = `translate(${-camX}px, ${-camY}px)`;

  // posiciona o sprite (centralizado em relação ao tile)
  playerEl.style.left = (px - camX) + 'px';
  playerEl.style.top  = (py - camY) + 'px';

  const tileX = Math.floor(px / STEP);
  const tileY = Math.floor(py / STEP);
  hudCoord.textContent = `POS: ${Math.round(px)}, ${Math.round(py)}`;
  hudCam.textContent   = `CAM: ${Math.round(camX)}, ${Math.round(camY)}`;
  hudTile.textContent  = `TILE: ${tileX}, ${tileY}`;
  updateZoneHud(tileX, tileY);
  updateMinimapDot();

  requestAnimationFrame(gameLoop);
}

requestAnimationFrame(gameLoop);
</script>
